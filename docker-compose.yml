services:
  postgres:
    image: postgres:16-alpine
    container_name: mudgame-postgres
    environment:
      POSTGRES_DB: mudgame
      POSTGRES_USER: mud
      POSTGRES_PASSWORD: mud
    ports:
      - "5432:5432"
    volumes:
      - mudgame_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mud -d mudgame"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mudgame_data:
