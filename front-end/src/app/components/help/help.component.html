<div class="help-backdrop" (click)="close()">
  <div class="help-panel" (click)="$event.stopPropagation()">

    <div class="help-header">
      <span class="help-title">Command Reference</span>
      <button class="help-close" (click)="close()" title="Close">✕</button>
    </div>

    <div class="help-body">
      @for (cat of categories; track cat.title) {
        <section class="help-category">
          <h3 class="cat-title">
            <span class="cat-icon">{{ cat.icon }}</span>
            {{ cat.title }}
          </h3>
          <table class="cmd-table">
            @for (entry of cat.entries; track entry.cmd) {
              <tr>
                <td class="cmd-cell"><code>{{ entry.cmd }}</code></td>
                <td class="desc-cell">{{ entry.desc }}</td>
              </tr>
            }
          </table>
        </section>
      }
    </div>

    <div class="help-footer">
      Natural language also works — just describe what you want to do.
    </div>

  </div>
</div>
