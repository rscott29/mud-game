<div class="who-panel">
  <div class="who-header">
    <span class="who-icon">⚔</span>
    <span class="who-title">Who's Online</span>
    <span class="who-count">{{ count() }}</span>
    <button class="who-close" (click)="close()" title="Close">✕</button>
  </div>

  @if (isEmpty()) {
    <div class="who-empty">
      <span class="who-empty-icon">🌑</span>
      <span>The realm is empty</span>
    </div>
  } @else {
    <ul class="who-list">
      @for (player of players(); track player.name) {
        <li class="who-card">
          <div class="who-card-avatar">
            {{ player.name.charAt(0).toUpperCase() }}
          </div>
          <div class="who-card-body">
            <div class="who-card-top">
              <span class="who-card-name">{{ player.name }}</span>
              <span class="who-card-level">Lv {{ player.level }}</span>
            </div>
            <div class="who-card-title">{{ player.title }}</div>
            <div class="who-card-location">
              <span class="who-location-icon">📍</span>{{ player.location }}
            </div>
          </div>
        </li>
      }
    </ul>
  }
</div>
