spring.application.name=mud-game
server.port=${PORT:8080}
app.websocket.allowed-origin-patterns=${APP_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://127.0.0.1:4200,http://localhost:8080,https://obsidianmud.com,https://www.obsidianmud.com}

# Optional local override file for developer secrets
spring.config.import=optional:file:.env.properties

# Logging
logging.level.com.scott.tech.mud=INFO

# Groq (via OpenAI-compatible API)
spring.ai.openai.base-url=https://api.groq.com/openai
# Prefer process env var; fall back to .env.properties value (groq.api.key)
spring.ai.openai.api-key=${GROQ_API_KEY:${groq.api.key:}}
spring.ai.openai.chat.options.model=llama-3.1-8b-instant

# Pre-populate AI text polisher cache for hot move templates at startup.
app.ai.warm-cache=true

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:mudgame}
spring.datasource.username=${PGUSER:mud}
spring.datasource.password=${PGPASSWORD:mud}
spring.datasource.driver-class-name=org.postgresql.Driver

# Let Flyway manage the schema; Hibernate only validates it
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Temporarily disable validation to allow modified migration checksums
spring.flyway.validate-on-migrate=false

# Devtools (local only — auto-disabled when running from a JAR)
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/resources

# ── AI Intent Cache ───────────────────────────────────────────────────────────
spring.cache.type=caffeine
spring.cache.cache-names=aiIntent,emotePerspective
# Max 1000 unique phrases; entries expire 1 hour after being written
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=3600s
