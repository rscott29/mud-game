# ── Test datasource (H2 in-memory, PostgreSQL compatibility mode) ─────────────
# Overrides the main application.properties so tests never need a live database.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# Let Flyway run the same migration SQL against H2
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Silence Ollama in tests — no AI calls made during unit tests
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2
spring.ai.ollama.chat.options.temperature=0.0
